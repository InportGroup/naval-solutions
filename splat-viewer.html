<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3SG — Visor Splat</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #fff;
      }
      #viewer {
        position: absolute;
        inset: 0;
      }
      #viewer canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #000;
        z-index: 10;
        transition: opacity 0.4s ease;
        text-align: center;
        padding: 24px;
      }
      #status.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid #ffffff22;
        border-top-color: #0080ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      #status-text {
        font-size: 0.95rem;
        font-weight: 500;
        color: #ffffffcc;
        letter-spacing: 0.3px;
      }
      #status-sub {
        font-size: 0.8rem;
        color: #ffffff66;
        max-width: 80%;
        word-break: break-word;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="status">
      <div class="spinner"></div>
      <div id="status-text">Cargando modelo 3D…</div>
      <div id="status-sub">Cargo_Container_cutted.splat</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/",
          "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        }
      }
    </script>

    <script type="module">
      import * as GaussianSplats3D from "@mkkellogg/gaussian-splats-3d";

      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const statusSub = document.getElementById("status-sub");

      try {
        const viewer = new GaussianSplats3D.Viewer({
          rootElement: document.getElementById("viewer"),
          sharedMemoryForWorkers: false,
          gpuAcceleratedSort: false,
          useBuiltInControls: true,
          dynamicScene: false,
          halfPrecisionCovariancesOnGPU: false,
          cameraUp: [0, -1, 0],
          initialCameraPosition: [0, 0, 5],
          initialCameraLookAt: [0, 0, 0],
        });

        viewer
          .addSplatScene("./Cargo_Container_cutted.splat", {
            showLoadingUI: false,
            progressiveLoad: false,
            onProgress: (percent) => {
              statusText.textContent =
                "Cargando modelo 3D… " + Math.round(percent) + "%";
            },
          })
          .then(() => {
            statusEl.classList.add("hidden");
            viewer.start();
          })
          .catch((err) => {
            console.error("addSplatScene failed:", err);
            statusText.textContent = "No se pudo cargar el modelo";
            statusSub.textContent = String(
              err && err.message ? err.message : err,
            );
          });
      } catch (err) {
        console.error("Viewer init failed:", err);
        statusText.textContent = "Error al iniciar el visor";
        statusSub.textContent = String(err && err.message ? err.message : err);
      }
    </script>
  </body>
</html>
